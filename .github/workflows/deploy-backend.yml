name: Deploy Backend

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE: nonware-backend
  REPOSITORY: nonware
  IMAGE: backend
  CLOUD_SQL_INSTANCE: ${{ secrets.GCP_CLOUD_SQL_INSTANCE }}
  GS_BUCKET_NAME: ${{ secrets.GS_BUCKET_NAME }}
  DJANGO_CORS_ALLOWED_ORIGINS: ${{ secrets.DJANGO_CORS_ALLOWED_ORIGINS }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Authenticate to GCP
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      # 3️⃣ Set up gcloud
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # 4️⃣ Configure Docker for Artifact Registry
      - name: Configure Docker
        run: gcloud auth configure-docker $REGION-docker.pkg.dev

      # 5️⃣ Build Docker Image
      - name: Build Docker Image
        run: |
          docker build \
            -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$GITHUB_SHA \
            -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:latest \
            ./backend

      # 6️⃣ Push Docker Image
      - name: Push Docker Image
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$GITHUB_SHA
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:latest

      # 7️⃣ Define environment variables (Flattened for stability)
      - name: Define environment variables
        run: |
          # Keep this on one single line to prevent shell parsing errors
          COMMON_ENV_VARS="DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }},DJANGO_ENV=prod,DJANGO_ALLOWED_HOSTS=${{ secrets.DJANGO_ALLOWED_HOSTS }},POSTGRES_DB=nonware-db,POSTGRES_USER=nonware,POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }},POSTGRES_HOST=/cloudsql/${{ secrets.GCP_CLOUD_SQL_INSTANCE }},POSTGRES_PORT=5432,GS_BUCKET_NAME=${{ secrets.GS_BUCKET_NAME }},DJANGO_CORS_ALLOWED_ORIGINS=${{ secrets.DJANGO_CORS_ALLOWED_ORIGINS }}"
          
          echo "COMMON_ENV_VARS=$COMMON_ENV_VARS" >> $GITHUB_ENV

      # 8️⃣ Run Django Tasks (Migrations & Static Files)
      - name: Run Django Tasks (Cloud Run Job)
        run: |
          JOB_NAME=backend-tasks-job
          IMAGE_URI=$REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$GITHUB_SHA

          # Note: No spaces between the commas in the --args flag
          gcloud run jobs replace $JOB_NAME \
            --image $IMAGE_URI \
            --region $REGION \
            --tasks 1 \
            --add-cloudsql-instances $CLOUD_SQL_INSTANCE \
            --set-env-vars "$COMMON_ENV_VARS" \
            --command "sh" \
            --args "-c,python manage.py migrate --noinput && python manage.py collectstatic --noinput" || \
          gcloud run jobs create $JOB_NAME \
            --image $IMAGE_URI \
            --region $REGION \
            --tasks 1 \
            --add-cloudsql-instances $CLOUD_SQL_INSTANCE \
            --set-env-vars "$COMMON_ENV_VARS" \
            --command "sh" \
            --args "-c,python manage.py migrate --noinput && python manage.py collectstatic --noinput"

          gcloud run jobs execute $JOB_NAME --region $REGION --wait

      # 9️⃣ Deploy to Cloud Run (Web Service)
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$GITHUB_SHA \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --add-cloudsql-instances $CLOUD_SQL_INSTANCE \
            --set-env-vars $COMMON_ENV_VARS \
            --service-account nonware-backend@nonware-prod.iam.gserviceaccount.com